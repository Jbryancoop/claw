name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Secret scanning — catches API keys, tokens, passwords in source
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Swift lint
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd Claw
          swiftlint lint --reporter github-actions-logging --quiet || true

  # Build
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild -project Claw/Claw.xcodeproj \
            -scheme Claw \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            build \
            SUPPORTED_PLATFORMS="iphoneos iphonesimulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify || tail -50

  # Server lint (Node.js)
  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    if: false  # Enable when server code is in repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx eslint server.js
